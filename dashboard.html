<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Issues Tracker – Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dashboard-body">

<nav class="navbar">
  <div class="nav-left">
    <img src="assets/github-logo.png" alt="GitHub Logo" class="nav-logo" />
    <span class="nav-brand">GitHub Issues Tracker</span>
  </div>
  <div class="nav-right">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" class="search-input" id="search-input" placeholder="Search issues..." oninput="onSearch()"/>
    </div>
    <button class="btn-new">+ New Issue</button>
  </div>
</nav>

<div class="main">
  <div class="tabs">
    <button class="tab active" data-tab="all"    onclick="setTab(this,'all')">All</button>
    <button class="tab"        data-tab="open"   onclick="setTab(this,'open')">Open</button>
    <button class="tab"        data-tab="closed" onclick="setTab(this,'closed')">Closed</button>
  </div>
