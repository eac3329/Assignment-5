<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Issues Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <img src="assets/github-logo.png" alt="GitHub Logo" />
  </div>
  <h1>GitHub Issues Tracker</h1>
  <p class="subtitle">Sign in to manage your issues</p>
  <div class="error-box" id="error-box">Invalid username or password</div>
  <div class="field">
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter Username" autocomplete="off"/>
    <span class="hint">Default: admin</span>
  </div>
  <div class="field">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter Password"/>
    <span class="hint">Default: admin123</span>
  </div>
